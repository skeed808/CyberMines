  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7e02f12a-b1b4-4757-9cb2-17c46e0c3649\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ==========================================================\n     Tokens\n     ========================================================== */\n  :root {\n    --void:      #05060a;\n    --void-2:    #080a12;\n    --panel:     #0b0e16;\n    --panel-2:   #11151f;\n    --line:      rgba(0, 231, 255, 0.14);\n    --line-2:    rgba(179, 136, 255, 0.18);\n    --text:      #e8ecf5;\n    --text-mute: #8892a6;\n    --text-dim:  #5a6378;\n\n    --cyan:      #00e7ff;\n    --purple:    #b388ff;\n    --magenta:   #ff2bd6;\n    --danger:    #ff3860;\n    --gold:      #ffd166;\n    --green:     #4ade80;\n\n    --glow-c: 0 0 24px rgba(0, 231, 255, 0.45), 0 0 64px rgba(0, 231, 255, 0.18);\n    --glow-m: 0 0 24px rgba(255, 43, 214, 0.45), 0 0 64px rgba(255, 43, 214, 0.15);\n    --glow-p: 0 0 24px rgba(179, 136, 255, 0.45), 0 0 64px rgba(179, 136, 255, 0.15);\n\n    --sans: 'Chakra Petch', 'Inter', system-ui, sans-serif;\n    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;\n\n    --radius: 14px;\n    --radius-lg: 22px;\n\n    --max: 1280px;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    font-family: var(--sans);\n    color: var(--text);\n    background: var(--void);\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n\n  a { color: inherit; text-decoration: none; }\n  button { font-family: inherit; cursor: pointer; }\n\n  /* ==========================================================\n     Background — ambient grid + fog + lighting\n     ========================================================== */\n  .ambient {\n    position: fixed; inset: 0; pointer-events: none; z-index: 0;\n    overflow: hidden;\n  }\n  .ambient .grid-bg {\n    position: absolute; inset: -2px;\n    background-image:\n      linear-gradient(rgba(0,231,255,0.055) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(0,231,255,0.055) 1px, transparent 1px);\n    background-size: 56px 56px;\n    mask-image: radial-gradient(ellipse at center, #000 0%, transparent 75%);\n    -webkit-mask-image: radial-gradient(ellipse at center, #000 0%, transparent 75%);\n  }\n  .ambient .scan {\n    position: absolute; inset: 0;\n    background:\n      repeating-linear-gradient(\n        to bottom,\n        transparent 0px,\n        transparent 3px,\n        rgba(255,255,255,0.012) 3px,\n        rgba(255,255,255,0.012) 4px\n      );\n    mix-blend-mode: overlay;\n  }\n  .ambient .glow-a, .ambient .glow-b, .ambient .glow-c {\n    position: absolute; width: 720px; height: 720px;\n    border-radius: 50%;\n    filter: blur(120px);\n    opacity: 0.35;\n  }\n  .ambient .glow-a { background: radial-gradient(circle, #00e7ff 0%, transparent 60%); top: -200px; left: -160px; animation: float-a 18s ease-in-out infinite alternate; }\n  .ambient .glow-b { background: radial-gradient(circle, #ff2bd6 0%, transparent 60%); top: 30%; right: -240px; animation: float-b 22s ease-in-out infinite alternate; }\n  .ambient .glow-c { background: radial-gradient(circle, #b388ff 0%, transparent 60%); bottom: -260px; left: 30%; animation: float-c 26s ease-in-out infinite alternate; }\n  @keyframes float-a { to { transform: translate(60px, 80px) scale(1.1); } }\n  @keyframes float-b { to { transform: translate(-90px, 50px) scale(0.95); } }\n  @keyframes float-c { to { transform: translate(40px, -80px) scale(1.05); } }\n\n  .vignette {\n    position: fixed; inset: 0; pointer-events: none; z-index: 1;\n    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);\n  }\n  .noise {\n    position: fixed; inset: 0; pointer-events: none; z-index: 2;\n    opacity: 0.07;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><\u002Ffilter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/><\u002Fsvg>\");\n    mix-blend-mode: overlay;\n  }\n\n  /* ==========================================================\n     Layout\n     ========================================================== */\n  main { position: relative; z-index: 3; }\n  .wrap { max-width: var(--max); margin: 0 auto; padding: 0 28px; }\n  @media (max-width: 640px) { .wrap { padding: 0 18px; } }\n\n  section { padding: 120px 0; position: relative; }\n  @media (max-width: 720px) { section { padding: 80px 0; } }\n\n  /* ==========================================================\n     Nav\n     ========================================================== */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    background: rgba(5,6,10,0.6);\n    border-bottom: 1px solid var(--line);\n  }\n  .nav-inner {\n    max-width: var(--max); margin: 0 auto;\n    padding: 16px 28px;\n    display: flex; align-items: center; gap: 28px;\n  }\n  .logo {\n    display: flex; align-items: center; gap: 10px;\n    font-weight: 700; letter-spacing: 0.06em;\n    font-size: 18px;\n  }\n  .logo-mark {\n    width: 28px; height: 28px;\n    background: linear-gradient(135deg, var(--cyan), var(--magenta));\n    clip-path: polygon(50% 0, 100% 30%, 100% 70%, 50% 100%, 0 70%, 0 30%);\n    box-shadow: var(--glow-c);\n  }\n  .logo b { background: linear-gradient(90deg, var(--cyan), #fff); -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .nav-links { display: flex; gap: 28px; margin-left: 24px; }\n  .nav-links a {\n    font-size: 14px; color: var(--text-mute);\n    transition: color .2s, text-shadow .2s;\n  }\n  .nav-links a:hover { color: var(--cyan); text-shadow: 0 0 14px rgba(0,231,255,0.6); }\n  .nav-cta { margin-left: auto; display: flex; gap: 12px; align-items: center; }\n  .pill-status {\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;\n    padding: 6px 10px; border: 1px solid rgba(74, 222, 128, 0.4);\n    border-radius: 99px; color: var(--green);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .pill-status::before {\n    content: \"\"; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--green); box-shadow: 0 0 10px var(--green);\n    animation: blink 1.6s infinite;\n  }\n  @keyframes blink { 50% { opacity: 0.3; } }\n  @media (max-width: 840px) {\n    .nav-links { display: none; }\n    .pill-status { display: none; }\n  }\n\n  /* ==========================================================\n     Buttons\n     ========================================================== */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n    padding: 14px 22px;\n    font-weight: 600; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;\n    border-radius: 10px;\n    border: 1px solid transparent;\n    transition: transform .2s, box-shadow .2s, background .2s, border-color .2s;\n    position: relative;\n    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);\n  }\n  .btn-primary {\n    color: #001218;\n    background: linear-gradient(135deg, #00e7ff 0%, #00b3ff 100%);\n    box-shadow: var(--glow-c);\n  }\n  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,231,255,0.7), 0 0 80px rgba(0,231,255,0.25); }\n  .btn-ghost {\n    color: var(--text);\n    background: rgba(179,136,255,0.06);\n    border: 1px solid rgba(179,136,255,0.4);\n  }\n  .btn-ghost:hover { background: rgba(179,136,255,0.12); border-color: var(--purple); box-shadow: var(--glow-p); }\n\n  /* ==========================================================\n     Hero\n     ========================================================== */\n  .hero { padding-top: 80px; padding-bottom: 80px; }\n  .hero-grid {\n    display: grid; grid-template-columns: 1.05fr 1fr; gap: 64px; align-items: center;\n  }\n  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }\n\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--cyan);\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 8px 14px;\n    border: 1px solid var(--line);\n    border-radius: 99px;\n    background: rgba(0,231,255,0.04);\n  }\n  .eyebrow::before {\n    content: \"\"; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--cyan); box-shadow: 0 0 10px var(--cyan);\n  }\n\n  h1 {\n    font-size: clamp(48px, 7vw, 96px);\n    line-height: 0.95; letter-spacing: -0.02em;\n    margin: 22px 0 18px;\n    font-weight: 700;\n    text-wrap: balance;\n  }\n  h1 .glitch {\n    position: relative; display: inline-block;\n    background: linear-gradient(180deg, #fff 0%, #cfe9ff 60%, #00e7ff 100%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n    text-shadow: 0 0 40px rgba(0,231,255,0.25);\n  }\n  h1 .glitch::before,\n  h1 .glitch::after {\n    content: attr(data-text);\n    position: absolute; left: 0; top: 0;\n    background: none; -webkit-text-fill-color: initial;\n    mix-blend-mode: screen;\n  }\n  h1 .glitch::before { color: var(--magenta); transform: translate(2px,0); animation: glitch-a 4s infinite steps(1); opacity: 0.85; }\n  h1 .glitch::after  { color: var(--cyan);    transform: translate(-2px,0); animation: glitch-b 4s infinite steps(1); opacity: 0.85; }\n  @keyframes glitch-a {\n    0%,90%,100% { clip-path: inset(100% 0 0 0); }\n    91% { clip-path: inset(10% 0 70% 0); }\n    93% { clip-path: inset(60% 0 30% 0); }\n    95% { clip-path: inset(25% 0 60% 0); }\n  }\n  @keyframes glitch-b {\n    0%,90%,100% { clip-path: inset(100% 0 0 0); }\n    92% { clip-path: inset(40% 0 50% 0); }\n    94% { clip-path: inset(70% 0 20% 0); }\n    96% { clip-path: inset(15% 0 75% 0); }\n  }\n  h1 .danger {\n    background: linear-gradient(180deg, #fff 0%, #ff2bd6 80%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n    text-shadow: 0 0 40px rgba(255,43,214,0.25);\n  }\n\n  .lead {\n    font-size: clamp(16px, 1.4vw, 18px);\n    color: var(--text-mute);\n    max-width: 540px;\n    margin: 0 0 32px;\n  }\n  .cta-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 44px; }\n\n  /* Hero stats */\n  .stats {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;\n    border: 1px solid var(--line);\n    border-radius: var(--radius);\n    background: linear-gradient(180deg, rgba(11,14,22,0.7), rgba(11,14,22,0.4));\n    backdrop-filter: blur(10px);\n    overflow: hidden;\n  }\n  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }\n  .stat {\n    padding: 18px 20px;\n    border-right: 1px solid var(--line);\n    position: relative;\n  }\n  .stat:last-child { border-right: none; }\n  @media (max-width: 720px) {\n    .stat:nth-child(2) { border-right: none; }\n    .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid var(--line); }\n  }\n  .stat-label {\n    font-family: var(--mono);\n    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--text-dim);\n  }\n  .stat-val {\n    font-family: var(--mono);\n    font-size: 22px; font-weight: 700;\n    margin-top: 6px;\n    color: var(--cyan);\n    text-shadow: 0 0 12px rgba(0,231,255,0.4);\n  }\n  .stat:nth-child(2) .stat-val { color: var(--gold); text-shadow: 0 0 12px rgba(255,209,102,0.45); }\n  .stat:nth-child(3) .stat-val { color: var(--green); text-shadow: 0 0 12px rgba(74,222,128,0.4); }\n  .stat:nth-child(4) .stat-val { color: var(--magenta); text-shadow: 0 0 12px rgba(255,43,214,0.4); }\n\n  /* Hero — animated mines grid */\n  .mines-card {\n    position: relative;\n    padding: 28px;\n    border-radius: var(--radius-lg);\n    border: 1px solid var(--line);\n    background:\n      linear-gradient(180deg, rgba(11,14,22,0.85), rgba(8,10,18,0.65));\n    backdrop-filter: blur(14px);\n    box-shadow:\n      0 30px 80px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,255,255,0.04);\n  }\n  .mines-card::before {\n    content: \"\";\n    position: absolute; inset: -1px;\n    border-radius: inherit;\n    padding: 1px;\n    background: linear-gradient(135deg, rgba(0,231,255,0.5), transparent 40%, transparent 60%, rgba(255,43,214,0.5));\n    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);\n    -webkit-mask-composite: xor; mask-composite: exclude;\n    pointer-events: none;\n  }\n  .card-header {\n    display: flex; justify-content: space-between; align-items: center;\n    margin-bottom: 18px;\n    font-family: var(--mono);\n    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--text-dim);\n  }\n  .card-header b { color: var(--cyan); font-weight: 600; }\n  .card-tag {\n    padding: 4px 10px;\n    border: 1px solid rgba(255,43,214,0.4);\n    color: var(--magenta);\n    border-radius: 99px;\n    font-size: 10px;\n  }\n  .mines-grid {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 8px;\n    aspect-ratio: 1 / 1;\n  }\n  .tile {\n    position: relative;\n    background: linear-gradient(180deg, #11151f, #0a0d15);\n    border: 1px solid rgba(0,231,255,0.18);\n    border-radius: 8px;\n    display: flex; align-items: center; justify-content: center;\n    transition: all .3s;\n    overflow: hidden;\n  }\n  .tile::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: linear-gradient(135deg, transparent 60%, rgba(0,231,255,0.18));\n    opacity: 0; transition: opacity .3s;\n  }\n  .tile:hover::after { opacity: 1; }\n  .tile.revealed {\n    background: linear-gradient(180deg, rgba(0,231,255,0.15), rgba(0,231,255,0.04));\n    border-color: var(--cyan);\n    box-shadow: inset 0 0 24px rgba(0,231,255,0.25), 0 0 18px rgba(0,231,255,0.25);\n  }\n  .tile.revealed::before {\n    content: \"\"; width: 16px; height: 16px;\n    background: var(--cyan); border-radius: 50%;\n    box-shadow: 0 0 18px var(--cyan);\n  }\n  .tile.mine {\n    background: linear-gradient(180deg, rgba(255,43,214,0.2), rgba(255,43,214,0.05));\n    border-color: var(--magenta);\n    box-shadow: inset 0 0 30px rgba(255,43,214,0.35), 0 0 24px rgba(255,43,214,0.45);\n    animation: mineflash 0.6s ease;\n  }\n  .tile.mine::before {\n    content: \"\"; width: 18px; height: 18px;\n    background: var(--magenta);\n    clip-path: polygon(50% 0,80% 20%,100% 50%,80% 80%,50% 100%,20% 80%,0 50%,20% 20%);\n    box-shadow: 0 0 22px var(--magenta);\n  }\n  @keyframes mineflash { 0% { transform: scale(0.7); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }\n\n  .mines-controls {\n    margin-top: 18px;\n    display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px;\n    font-family: var(--mono); font-size: 12px;\n  }\n  .ctrl {\n    border: 1px solid var(--line);\n    border-radius: 8px;\n    padding: 10px 12px;\n    background: rgba(11,14,22,0.7);\n  }\n  .ctrl .k { color: var(--text-dim); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }\n  .ctrl .v { color: var(--text); font-size: 16px; font-weight: 700; margin-top: 2px; }\n  .ctrl.multiplier .v { color: var(--cyan); text-shadow: 0 0 12px rgba(0,231,255,0.5); }\n  .cashout-btn {\n    width: 100%; margin-top: 12px;\n    padding: 14px;\n    border: 1px solid var(--cyan);\n    background: linear-gradient(90deg, rgba(0,231,255,0.18), rgba(0,231,255,0.04));\n    color: var(--cyan);\n    font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;\n    border-radius: 8px;\n    transition: all .2s;\n  }\n  .cashout-btn:hover { background: rgba(0,231,255,0.3); color: #001218; }\n\n  /* ==========================================================\n     Section heads\n     ========================================================== */\n  .sec-head { text-align: center; margin-bottom: 64px; }\n  .sec-head .eyebrow { margin-bottom: 18px; }\n  .sec-head h2 {\n    font-size: clamp(32px, 4.4vw, 56px);\n    line-height: 1.05; letter-spacing: -0.015em;\n    margin: 0 0 14px;\n    font-weight: 700;\n    background: linear-gradient(180deg, #fff 0%, #b8c5d8 100%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n    text-wrap: balance;\n  }\n  .sec-head p {\n    color: var(--text-mute);\n    max-width: 640px; margin: 0 auto;\n    font-size: 16px;\n  }\n\n  /* ==========================================================\n     Features\n     ========================================================== */\n  .feat-grid {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;\n  }\n  @media (max-width: 1024px) { .feat-grid { grid-template-columns: repeat(2, 1fr); } }\n  @media (max-width: 560px)  { .feat-grid { grid-template-columns: 1fr; } }\n\n  .feat {\n    position: relative;\n    padding: 26px 22px;\n    border: 1px solid var(--line);\n    border-radius: var(--radius);\n    background: linear-gradient(180deg, rgba(11,14,22,0.7), rgba(8,10,18,0.4));\n    backdrop-filter: blur(10px);\n    transition: transform .25s, border-color .25s, box-shadow .25s;\n    overflow: hidden;\n  }\n  .feat::before {\n    content: \"\"; position: absolute; inset: 0;\n    background: radial-gradient(circle at var(--mx,50%) var(--my,0%), rgba(0,231,255,0.15), transparent 50%);\n    opacity: 0; transition: opacity .3s;\n    pointer-events: none;\n  }\n  .feat:hover { transform: translateY(-4px); border-color: rgba(0,231,255,0.5); box-shadow: 0 18px 50px rgba(0,231,255,0.12); }\n  .feat:hover::before { opacity: 1; }\n  .feat .icon eroMines');\n    const TILES = 25;\n    for (let i = 0; i < TILES; i++) {\n      const t = document.createElement('div');\n      t.className = 'tile';\n      grid.appendChild(t);\n    }\n    const tiles = [...grid.children];\n    const multEl = document.getElementById('heroMult');\n    const cashEl = document.getElementById('heroCash');\n\n    function shuffle(arr) {\n      for (let i = arr.length - 1; i > 0; i--) {\n        const j = Math.floor(Math.random() * (i+1));\n        [arr[i], arr[j]] = [arr[j], arr[i]];\n      }\n      return arr;\n    }\n\n    let timeouts = [];\n    function cycle() {\n      timeouts.forEach(clearTimeout);\n      timeouts = [];\n      tiles.forEach(t => t.className = 'tile');\n      const order = shuffle([...Array(TILES).keys()]);\n      const mines = new Set(order.slice(0, 5));\n      const safe = order.slice(5);\n\n      let mult = 1;\n      const safeCount = 6 + Math.floor(Math.random() * 6);\n      for (let i = 0; i < safeCount; i++) {\n        timeouts.push(setTimeout(() => {\n          tiles[safe[i]].classList.add('revealed');\n          mult *= 1.25 + Math.random() * 0.15;\n          multEl.textContent = mult.toFixed(2) + '×';\n          cashEl.textContent = '$' + (25 * mult).toFixed(2);\n        }, 350 + i * 380));\n      }\n      timeouts.push(setTimeout(() => {\n        const m = [...mines][0];\n        tiles[m].classList.add('mine');\n      }, 350 + safeCount * 380 + 400));\n      timeouts.push(setTimeout(cycle, 350 + safeCount * 380 + 2400));\n    }\n    cycle();\n  })();\n\n  /* ============================================================\n     Showcase mines grid — static styled, gentle pulse\n     ============================================================ */\n  (function () {\n    const grid = document.getElementById('showcaseMines');\n    if (!grid) return;\n    const TILES = 25;\n    const revealed = new Set([0,2,6,8,10,13,17,21]);\n    const mine = 24;\n    for (let i = 0; i < TILES; i++) {\n      const t = document.createElement('div');\n      t.className = 'tile';\n      if (revealed.has(i)) t.classList.add('revealed');\n      if (i === mine) t.classList.add('mine');\n      grid.appendChild(t);\n    }\n    // Animate multipliers\n    const mEl = document.getElementById('showcaseMult');\n    const fmEl = document.getElementById('showcaseFloatMult');\n    let v = 3.84;\n    setInterval(() => {\n      v += (Math.random() - 0.35) * 0.12;\n      v = Math.max(2.4, Math.min(8.5, v));\n      const s = v.toFixed(2) + '×';\n      mEl.textContent = s; fmEl.textContent = s;\n    }, 900);\n  })();\n\n  /* ============================================================\n     Hero stat counters\n     ============================================================ */\n  (function () {\n    const els = document.querySelectorAll('[data-counter]');\n    els.forEach(el => {\n      const target = parseInt(el.dataset.counter, 10);\n      const duration = 1600;\n      const start = performance.now();\n      function tick(t) {\n        const p = Math.min(1, (t - start) / duration);\n        const eased = 1 - Math.pow(1 - p, 3);\n        const v = Math.floor(target * eased);\n        el.textContent = v.toLocaleString('en-US');\n        if (p < 1) requestAnimationFrame(tick);\n      }\n      requestAnimationFrame(tick);\n    });\n  })();\n\n  /* ============================================================\n     Reveal on scroll\n     ============================================================ */\n  (function () {\n    const els = document.querySelectorAll('.reveal');\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n      });\n    }, { rootMargin: '0px 0px -10% 0px' });\n    els.forEach(el => io.observe(el));\n  })();\n\n  /* ============================================================\n     Feature card mouse glow\n     ============================================================ */\n  (function () {\n    document.querySelectorAll('.feat').forEach(card => {\n      card.addEventListener('mousemove', (e) => {\n        const r = card.getBoundingClientRect();\n        card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');\n        card.style.setProperty('--my', ((e.clientY - r.top)  / r.height * 100) + '%');\n      });\n    });\n  })();\n\n  /* ============================================================\n     Subtle parallax on hero glows\n     ============================================================ */\n  (function () {\n    const a = document.querySelector('.ambient .glow-a');\n    const b = document.querySelector('.ambient .glow-b');\n    const c = document.querySelector('.ambient .glow-c');\n    window.addEventListener('mousemove', (e) => {\n      const x = (e.clientX / window.innerWidth - 0.5);\n      const y = (e.clientY / window.innerHeight - 0.5);\n      a.style.translate = `${x * 30}px ${y * 30}px`;\n      b.style.translate = `${x * -40}px ${y * -20}px`;\n      c.style.translate = `${x * 20}px ${y * -30}px`;\n    }, { passive: true });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
